<!DOCTYPE html>
<html>
  <head>
    <title>Todo App</title>
    <link
      href="https://fonts.googleapis.com/css?family=Lato:300,400,700"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" media="screen" charset="utf-8" />
  </head>
  <body>
    <header class="header">
      <h1 class="header-title title">Todo App</h1>
      <section class="header__intro intro">
        <img class="header__image image"
          src="./eisenhower-matrix.jpg"
          alt="The eisenhoer matrix divided into 4 sectors with inscriptions Do, Plan, Delegate, Eliminate"
        />
        <nav class="header__nav nav">
          <a
            class="header__more-inf more-inf"
            href="https://goal-life.com/page/method/matrix-eisenhower"
            >Want more details?
          </a>
        </nav>
      </section>
    </header>
    <main class="main">
      <section class="add-item">
        <div id="add-task">
          <label for="new-task">Add Item</label>
          <div class="add-item__task-row-wrapper task-row-wrapper">
            <input id="new-task" class="task" type="text" />
            <button>Add</button>
          </div>
        </div>
      </section>
      <section class="to-do">
        <h3>Todo</h3>
        <ul class="to-do__list" id="incomplete-tasks">
          <li class="to-do__item">
            <input type="checkbox" />
            <label class="task">Pay Bills</label>
            <input type="text" />
            <button class="edit">Edit</button>
            <button class="delete">
              <img src="./remove.svg" />
            </button>
          </li>
          <li class="to-do__item edit-mode">
            <input type="checkbox" />
            <label class="task">Go Shopping</label>
            <input type="text" value="Go Shopping" class="task" />
            <button class="edit">Save</button>
            <button class="delete">
              <img src="./remove.svg" />
            </button>
          </li>
        </ul>
      </section>
      <section class="completed">
        <h3>Completed</h3>
        <ul class="completed__list" id="completed-tasks">
          <li class="completed__item">
            <input type="checkbox" checked />
            <label class="task">See the Doctor</label>
            <input type="text" class="task" />
            <button class="edit">Edit</button>
            <button class="delete">
              <img src="./remove.svg" />
            </button>
          </li>
        </ul>
      </section>
      <script src="app.js"></script>
    </main>
  </body>
</html>
